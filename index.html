<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐂</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Forte Gado - Sistema de Vendas em Campo, Controle de Estoque Físico, Assinaturas Digitais e Integração com Supabase e Google Sheets." />
    
    <!-- PWA Meta Tags & Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#002E73" />
    
    <!-- Suporte para iOS (Safari App Web Instalável) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Forte Gado" />
    <link rel="apple-touch-icon" href="/logo-pwa.jpg" />
    
    <title>Forte Gado - Vendas &amp; Estoque Agropecuário</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Registro do Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[PWA] Service Worker registrado no escopo:', reg.scope))
            .catch(err => console.error('[PWA] Erro ao registrar Service Worker:', err));
        });
      }
    </script>
  </body>
</html>
