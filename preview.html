      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }, [name]);
      return <i data-lucide={name} style={{ width: size, height: size, color: color, display: 'inline-block' }} className={className}></i>;

    function getLocalDateString(dateObj = new Date()) {
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, '0');
      const day = String(dateObj.getDate()).padStart(2, '0');

    async function syncToGoogleSheets(actionType, payload) {
      const creds = getCredentials();
      if (!creds.googleSheetsUrl) return { success: false, reason: 'Sheets não configurado' };
      if (creds.simulateOffline) return { success: false, reason: 'Modo Offline Ativado' };

      const db = getDb();
      let sheetsPayload = {};

      try {
        if (actionType === 'CREATE_ORDER') {
          const client = db.clientes.find(c => c.id === payload.pedido.cliente_id) || {};
          const seller = db.usuarios.find(u => u.id === payload.pedido.vendedor_id) || {};
          sheetsPayload = {
            action: 'CREATE_ORDER',
            payload: {
              pedido: payload.pedido,
              clienteNome: client.nome || 'Desconhecido',
              clienteCidade: client.cidade || 'Não informada',
              vendedorNome: seller.nome || 'Vendedor',
              parcelas: payload.parcelas
            }
          };
        } else if (actionType === 'CONFIRM_DELIVERY') {
          const ped = db.pedidos.find(p => p.id === payload.pedidoId) || {};
          const items = db.itens_pedido.filter(i => i.pedido_id === payload.pedidoId);
          const resolvedItems = items.map(it => {
            const prod = db.produtos.find(p => p.id === it.produto_id) || {};
            return { ...it, produtoNome: prod.nome || 'Produto' };
          });
          sheetsPayload = {
            action: 'CONFIRM_DELIVERY',
            payload: { pedidoNumero: ped.numero, itens: resolvedItems }
          };
        } else if (actionType === 'CANCEL_ORDER') {
          const ped = db.pedidos.find(p => p.id === payload.pedidoId) || {};
          sheetsPayload = { action: 'CANCEL_ORDER', payload: { pedidoNumero: ped.numero } };
        } else if (actionType === 'REOPEN_ORDER') {
          const ped = db.pedidos.find(p => p.id === payload.pedidoId) || {};
          sheetsPayload = { action: 'REOPEN_ORDER', payload: { pedidoNumero: ped.numero } };
        } else if (actionType === 'RECEIVE_INSTALLMENT') {
          const par = db.parcelas.find(p => p.id === payload.parcelaId) || {};
          const ped = db.pedidos.find(p => p.id === par.pedido_id) || {};
          const client = db.clientes.find(c => c.id === ped.cliente_id) || {};
          const allPars = db.parcelas.filter(p => p.pedido_id === ped.id);
          const index = allPars.findIndex(p => p.id === par.id) + 1;
          sheetsPayload = {
            action: 'RECEIVE_INSTALLMENT',
            payload: { clienteNome: client.nome, parcelaIndex: index + '/' + allPars.length, pedidoNumero: ped.numero }
          };
        }

        const response = await fetch(creds.googleSheetsUrl, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(sheetsPayload)
        });
        return await response.json();
      } catch (err) {
        console.error(err);
        return { success: false, error: err.message };
      }
    }

    function base64ToBlob(base64Str) {
      if (!base64Str) return null;
      const mimeMatch = base64Str.match(/^data:([^;]+);base64,/);
      const mimeType = mimeMatch ? mimeMatch[1] : 'image/jpeg';
      const base64Data = base64Str.replace(/^data:[^;]+;base64,/, "");
      
      try {
        const byteCharacters = atob(base64Data);
        const byteNumbers = new Array(byteCharacters.length);
        for (let i = 0; i < byteCharacters.length; i++) {
          byteNumbers[i] = byteCharacters.charCodeAt(i);
        }
        const byteArray = new Uint8Array(byteNumbers);
        return new Blob([byteArray], { type: mimeType });
      } catch (e) {
        console.error('[Base64 to Blob] Erro ao converter:', e);
        return null;
      }
    }

    async function uploadImageToSupabase(client, imageStr, folder, fileName) {
      if (!imageStr) return null;
      if (imageStr.startsWith('http')) return imageStr;
      if (!imageStr.startsWith('data:') && imageStr.length < 100) return imageStr;

      const blob = base64ToBlob(imageStr);
      if (!blob) return null;

      const fileExt = blob.type.split('/')[1] || 'jpg';
      const filePath = `${folder}/${fileName}.${fileExt}`;

      try {
        const { data: buckets } = await client.storage.listBuckets();
        const bucketExists = buckets?.some(b => b.name === 'imagens');
        if (!bucketExists) {
          console.log('[Supabase Storage] Criando bucket "imagens"...');
          await client.storage.createBucket('imagens', { public: true });
        }
      } catch (e) {
        console.warn('[Supabase Storage] Não foi possível verificar/criar bucket:', e);
      }

      console.log(`[Supabase Storage] Enviando arquivo: ${filePath}`);
      const { error: uploadError } = await client.storage
        .from('imagens')
        .upload(filePath, blob, {
          cacheControl: '3600',
          upsert: true
        });

      if (uploadError) {
        console.error('[Supabase Storage] Erro no envio:', uploadError);
        try {
          await client.storage.createBucket('imagens', { public: true });
          const { error: retryError } = await client.storage
            .from('imagens')
            .upload(filePath, blob, {
              cacheControl: '3600',
              upsert: true
            });
          if (retryError) return null;
        } catch (err) {
          return null;
        }
      }

      const { data } = client.storage.from('imagens').getPublicUrl(filePath);
      return data?.publicUrl;
    }

    async function syncQueueToSupabase() {
      const creds = getCredentials();
      if (!creds.supabaseUrl || !creds.supabaseAnonKey) return { success: false, reason: 'Supabase não configurado. Por favor, insira a URL e a Anon Key.' };
      if (creds.simulateOffline) return { success: false, reason: 'Modo Offline Ativado' };

      const queue = getSyncQueue();
      if (queue.length === 0) return { success: true, processed: 0 };

      if (!window.supabase) {
        return { success: false, reason: 'Biblioteca Supabase (SDK) não pôde ser carregada. Verifique sua conexão com a internet.' };
      }

      // Carregar Supabase client dinamicamente da CDN
      let supabase;
      try {
        supabase = window.supabase.createClient(creds.supabaseUrl, creds.supabaseAnonKey);
      } catch (err) {
        return { success: false, reason: `Erro ao inicializar Supabase: ${err.message}` };
      }

      let processedCount = 0;
      const newQueue = [...queue];
      let syncError = null;

      for (const item of queue) {
        try {
          const { actionType, payload } = item;
          let success = false;
          let lastError = null;

          if (actionType === 'CREATE_ORDER') {
            const { error: errPed } = await supabase.from('pedidos').insert(payload.pedido);
            if (errPed) { lastError = errPed; }
            else {
              const { error: errItens } = await supabase.from('itens_pedido').insert(payload.itens);
              if (errItens) { lastError = errItens; }
              else {
                const { error: errPar } = await supabase.from('parcelas').insert(payload.parcelas);
                if (errPar) { lastError = errPar; }
                else {
                  let assinaturaUrl = payload.assinatura.imagem;
                  if (assinaturaUrl && (assinaturaUrl.startsWith('data:') || assinaturaUrl.length > 500)) {
                    const uploadedUrl = await uploadImageToSupabase(supabase, assinaturaUrl, 'assinaturas', `pedido_${payload.pedido.id}`);
                    if (uploadedUrl) assinaturaUrl = uploadedUrl;
                  }
                  const { error: errAss } = await supabase.from('assinaturas').insert({
                    ...payload.assinatura,
                    imagem: assinaturaUrl
                  });
                  if (errAss) { lastError = errAss; }
                  else {
                    const { error: errLoc } = await supabase.from('localizacoes').insert(payload.localizacao);
                    if (errLoc) { lastError = errLoc; }
                  }
                }
              }
            }
            success = !lastError;
          } else if (actionType === 'CONFIRM_DELIVERY') {
            const { error: errPed } = await supabase.from('pedidos').update({ status: 'Entregue' }).eq('id', payload.pedidoId);
            if (errPed) { lastError = errPed; }
            else {
              let fotoUrl = payload.foto.imagem;
              if (fotoUrl && (fotoUrl.startsWith('data:') || fotoUrl.length > 500)) {
                const uploadedUrl = await uploadImageToSupabase(supabase, fotoUrl, 'entregas', `pedido_${payload.foto.pedido_id}`);
                if (uploadedUrl) fotoUrl = uploadedUrl;
              }
              const { error: errFoto } = await supabase.from('fotos_entrega').insert({
                ...payload.foto,
                imagem: fotoUrl
              });
              if (errFoto) { lastError = errFoto; }
              else {
                const { error: errLoc } = await supabase.from('localizacoes').insert(payload.localizacao);
                if (errLoc) { lastError = errLoc; }
              }
            }
            success = !lastError;
          } else if (actionType === 'CANCEL_ORDER') {
            const { error: errPed } = await supabase.from('pedidos').update({ status: 'Cancelado' }).eq('id', payload.pedidoId);
            if (errPed) lastError = errPed;
            success = !lastError;
          } else if (actionType === 'REOPEN_ORDER') {
            const { error: errPed } = await supabase.from('pedidos').update({ status: 'Emitido' }).eq('id', payload.pedidoId);
            if (errPed) lastError = errPed;
            success = !lastError;
          } else if (actionType === 'RECEIVE_INSTALLMENT') {
            const { error: errPar } = await supabase.from('parcelas').update({ pago: true }).eq('id', payload.parcelaId);
            if (errPar) lastError = errPar;
            success = !lastError;
          } else if (actionType === 'CREATE_CLIENT') {
            const { error: errCli } = await supabase.from('clientes').insert(payload);
            if (errCli) lastError = errCli;
            success = !lastError;
          } else if (actionType === 'ADJUST_STOCK') {
            const { error: errEst } = await supabase.from('estoque').update({
              quantidade_atual: payload.quantidade_atual,
              estoque_minimo: payload.estoque_minimo,
              updated_at: new Date().toISOString()
            }).eq('produto_id', payload.produtoId);
            if (errEst) lastError = errEst;
            success = !lastError;
          } else {
            // Ignorar desconhecido para evitar travamento da fila
            success = true;
          }

          if (success) {
            newQueue.shift();
            processedCount++;
          } else {
            syncError = lastError;
            break;
          }
        } catch (e) {
          console.error(e);
          syncError = e;
          break;
        }
      }

      saveSyncQueue(newQueue);
      
      if (syncError) {
        return { success: false, reason: syncError.message || JSON.stringify(syncError), processed: processedCount };
      }
      return { success: true, processed: processedCount };
    }

    async function downloadDataFromSupabase() {
      const creds = getCredentials();
      if (!creds.supabaseUrl || !creds.supabaseAnonKey) return { success: false, reason: 'Supabase não configurado. Por favor, configure nas Configurações.' };

      if (!window.supabase) {
        return { success: false, reason: 'SDK do Supabase não pôde ser carregado. Verifique a internet.' };
      }

      try {
        const supabase = window.supabase.createClient(creds.supabaseUrl, creds.supabaseAnonKey);
        
        const { data: empresas, error: errEmp } = await supabase.from('empresas').select('*');
        if (errEmp) throw errEmp;
        
        const { data: usuarios, error: errUsr } = await supabase.from('usuarios').select('*');
        if (errUsr) throw errUsr;
        
        const { data: clientes, error: errCli } = await supabase.from('clientes').select('*');
        if (errCli) throw errCli;
        
        const { data: produtos, error: errPrd } = await supabase.from('produtos').select('*');
        if (errPrd) throw errPrd;
        
        const { data: estoque, error: errEst } = await supabase.from('estoque').select('*');
        if (errEst) throw errEst;
        
        const { data: pedidos, error: errPed } = await supabase.from('pedidos').select('*');
        if (errPed) throw errPed;
        
        const { data: itens_pedido, error: errItens } = await supabase.from('itens_pedido').select('*');
        if (errItens) throw errItens;
        
        const { data: parcelas, error: errPar } = await supabase.from('parcelas').select('*');
        if (errPar) throw errPar;
        
        const { data: assinaturas, error: errAss } = await supabase.from('assinaturas').select('*');
        if (errAss) throw errAss;
        
        const { data: fotos_entrega, error: errFoto } = await supabase.from('fotos_entrega').select('*');
        if (errFoto) throw errFoto;
        
        const { data: localizacoes, error: errLoc } = await supabase.from('localizacoes').select('*');
        if (errLoc) throw errLoc;

        const db = getDb();
        // Sobrescreve os dados locais com os dados do Supabase (para limpar dados mock antigos)
        if (Array.isArray(empresas)) db.empresas = empresas.length ? empresas : db.empresas;
        if (Array.isArray(usuarios) && usuarios.length) db.usuarios = usuarios;
        if (Array.isArray(clientes) && clientes.length) db.clientes = clientes;
        if (Array.isArray(produtos) && produtos.length) db.produtos = produtos;
        if (Array.isArray(estoque) && estoque.length) db.estoque = estoque;
        if (Array.isArray(pedidos)) db.pedidos = pedidos; // Sempre substitui
        if (Array.isArray(itens_pedido)) db.itens_pedido = itens_pedido;
        if (Array.isArray(parcelas)) db.parcelas = parcelas;
        if (Array.isArray(assinaturas)) db.assinaturas = assinaturas;
        if (Array.isArray(fotos_entrega)) db.fotos_entrega = fotos_entrega;
        if (Array.isArray(localizacoes)) db.localizacoes = localizacoes;

        console.log(`[Supabase Download] Sincronizado: ${empresas?.length || 0} empresas, ${usuarios?.length || 0} usuários, ${pedidos?.length || 0} pedidos.`);
        saveDb(db);
        return { success: true };
      } catch (err) {
        console.error('[Supabase Download Error]', err);
        return { success: false, reason: err.message || JSON.stringify(err) };
      }
    }

    function createOrderLocal(orderData) {
      const db = getDb();
      const nextId = db.pedidos.length > 0 ? Math.max(...db.pedidos.map(p => p.id)) + 1 : 1001;
      const nextNum = `FG-${nextId}`;
      
      const newOrder = {
        id: nextId,
        numero: nextNum,
        cliente_id: Number(orderData.cliente_id),
        vendedor_id: Number(orderData.vendedor_id),
        data: new Date().toISOString(),
        status: 'Emitido',
        total: orderData.total
      };
      
      const items = orderData.itens.map((it, idx) => ({
        id: db.itens_pedido.length > 0 ? Math.max(...db.itens_pedido.map(i => i.id)) + 1 + idx : 1 + idx,
        pedido_id: nextId,
        produto_id: Number(it.produto_id),
        quantidade: Number(it.quantidade),
        valor_unitario: Number(it.valor_unitario),
        desconto: Number(it.desconto || 0)
      }));

      const parcelas = orderData.parcelas.map((par, idx) => ({
        id: db.parcelas.length > 0 ? Math.max(...db.parcelas.map(p => p.id)) + 1 + idx : 1 + idx,
        pedido_id: nextId,
        vencimento: par.vencimento,
        valor: Number(par.valor),
        pago: false
      }));

      const assinatura = {
        id: db.assinaturas.length > 0 ? Math.max(...db.assinaturas.map(a => a.id)) + 1 : 1,
        pedido_id: nextId,
        imagem: orderData.assinatura
      };

      const localizacao = {
        id: db.localizacoes.length > 0 ? Math.max(...db.localizacoes.map(l => l.id)) + 1 : 1,
        pedido_id: nextId,
        tipo: 'venda',
        latitude: orderData.latitude,
        longitude: orderData.longitude,
        data_hora: new Date().toISOString()
      };

      // Reservar Estoque
      orderData.itens.forEach(it => {
        const est = db.estoque.find(e => e.produto_id === Number(it.produto_id));
        if (est) est.quantidade_reservada += Number(it.quantidade);
      });

      db.pedidos.push(newOrder);
      db.itens_pedido.push(...items);
      db.parcelas.push(...parcelas);
      db.assinaturas.push(assinatura);
      db.localizacoes.push(localizacao);
      saveDb(db);

      addToSyncQueue('CREATE_ORDER', {
        pedido: newOrder,
        itens: items,
        parcelas,
        assinatura,
        localizacao
      });

      return newOrder;
    }

    function confirmDeliveryLocal(pedidoId, deliveryData) {
      const db = getDb();
      const ped = db.pedidos.find(p => p.id === Number(pedidoId));
      if (!ped) return null;

      ped.status = 'Entregue';

      const foto = {
        id: db.fotos_entrega.length > 0 ? Math.max(...db.fotos_entrega.map(f => f.id)) + 1 : 1,
        pedido_id: Number(pedidoId),
        imagem: deliveryData.imagem
      };
      db.fotos_entrega.push(foto);

      const localizacao = {
        id: db.localizacoes.length > 0 ? Math.max(...db.localizacoes.map(l => l.id)) + 1 : 1,
        pedido_id: Number(pedidoId),
        tipo: 'entrega',
        latitude: deliveryData.latitude,
        longitude: deliveryData.longitude,
        data_hora: new Date().toISOString()
      };
      db.localizacoes.push(localizacao);

      const itens = db.itens_pedido.filter(i => i.pedido_id === Number(pedidoId));
      itens.forEach(it => {
        const est = db.estoque.find(e => e.produto_id === Number(it.produto_id));
        if (est) {
          est.quantidade_reservada = Math.max(0, est.quantidade_reservada - it.quantidade);
          est.quantidade_atual = Math.max(0, est.quantidade_atual - it.quantidade);
        }
      });

      saveDb(db);

      addToSyncQueue('CONFIRM_DELIVERY', {
        pedidoId: Number(pedidoId),
        foto,
        localizacao
      });

      return ped;
    }

    function cancelOrderLocal(pedidoId) {
      const db = getDb();
      const ped = db.pedidos.find(p => p.id === Number(pedidoId));
      if (!ped) return null;

      const oldStatus = ped.status;
      ped.status = 'Cancelado';

      if (oldStatus === 'Emitido') {
        const itens = db.itens_pedido.filter(i => i.pedido_id === Number(pedidoId));
        itens.forEach(it => {
          const est = db.estoque.find(e => e.produto_id === Number(it.produto_id));
          if (est) est.quantidade_reservada = Math.max(0, est.quantidade_reservada - it.quantidade);
        });
      }

      saveDb(db);
      addToSyncQueue('CANCEL_ORDER', { pedidoId: Number(pedidoId), oldStatus });
      return ped;
    }

    function receiveInstallmentLocal(parcelaId) {
      const db = getDb();
      const par = db.parcelas.find(p => p.id === Number(parcelaId));
      if (!par) return null;

      par.pago = true;
      saveDb(db);
      addToSyncQueue('RECEIVE_INSTALLMENT', { parcelaId: Number(parcelaId) });
      return par;
    }

    function adjustStockLocal(produtoId, novaQty, novaMin) {
      const db = getDb();
      const est = db.estoque.find(e => e.produto_id === Number(produtoId));
      if (!est) return null;

      est.quantidade_atual = Number(novaQty);
      est.estoque_minimo = Number(novaMin);
      saveDb(db);
      addToSyncQueue('ADJUST_STOCK', { produtoId: Number(produtoId), quantidade_atual: est.quantidade_atual, estoque_minimo: est.estoque_minimo });
      return est;
    }

    // 1. CanvasSignature
    function CanvasSignature({ onSave, onClearSignature }) {
      const canvasRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);
      const [isEmpty, setIsEmpty] = useState(true);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        canvas.width = canvas.parentNode.getBoundingClientRect().width;
        canvas.height = 180;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#1A1A1A';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
      }, []);

      const getCoords = (e) => {
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        if (e.touches && e.touches.length > 0) {
          return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        }
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      };

      const start = (e) => {
        e.preventDefault();
        const coords = getCoords(e);
        const ctx = canvasRef.current.getContext('2d');
        ctx.beginPath();
        ctx.moveTo(coords.x, coords.y);
        setIsDrawing(true);
        setIsEmpty(false);
      };

      const draw = (e) => {
        if (!isDrawing) return;
        e.preventDefault();
        const coords = getCoords(e);
        const ctx = canvasRef.current.getContext('2d');
        ctx.lineTo(coords.x, coords.y);
        ctx.stroke();
      };

      const stop = () => {
        if (!isDrawing) return;
        setIsDrawing(false);
        const dataUrl = canvasRef.current.toDataURL('image/png');
        onSave(dataUrl);
      };

      const clear = () => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        setIsEmpty(true);
        onClearSignature();
      };

      return (
        <div>
          <div className="signature-container" style={{ position: 'relative' }}>
            <canvas ref={canvasRef} className="signature-canvas"
              onMouseDown={start} onMouseMove={draw} onMouseUp={stop} onMouseLeave={stop}
              onTouchStart={start} onTouchMove={draw} onTouchEnd={stop} />
            {isEmpty && <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', color: '#A0AEC0', pointerEvents: 'none' }}>Assine aqui</div>}
          </div>
          <div className="signature-actions">
            <button type="button" className="btn btn-secondary" onClick={clear} style={{ width: 'auto', padding: '6px 12px', fontSize: '0.8rem' }}>Limpar</button>
          </div>
        </div>
      );
    }

    // 2. CameraCapture
    function CameraCapture({ onCapture, onClear }) {
      const [preview, setPreview] = useState(null);
      const inputRef = useRef(null);

      const handleChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          setPreview(event.target.result);
          onCapture(event.target.result);
        };
        reader.readAsDataURL(file);
      };

      const clear = () => {
        setPreview(null);
        onClear();
      };

      return (
        <div>
          <input ref={inputRef} type="file" accept="image/*" capture="environment" onChange={handleChange} style={{ display: 'none' }} />
          {preview ? (
            <div style={{ position: 'relative', borderRadius: '8px', overflow: 'hidden' }}>
              <img src={preview} style={{ width: '100%', maxHeight: '200px', objectFit: 'cover' }} />
              <button type="button" className="btn btn-danger" onClick={clear} style={{ width: 'auto', padding: '4px 10px', fontSize: '0.75rem', position: 'absolute', bottom: '10px', right: '10px' }}>Tirar Outra</button>
            </div>
          ) : (
            <div onClick={() => inputRef.current.click()} style={{ border: '2px dashed var(--azul-secundario)', padding: '30px', borderRadius: '8px', textAlign: 'center', cursor: 'pointer', background: '#F8FAFC' }}>
              <Camera size={24} color="var(--azul-principal)" />
              <p style={{ margin: '8px 0 0 0', fontSize: '0.8rem' }}>Tirar Foto do Comprovante</p>
            </div>
          )}
        </div>
      );
    }

    // 3. OfflineIndicator
    function OfflineIndicator() {
      const [isOnline, setIsOnline] = useState(navigator.onLine);
      const [queueCount, setQueueCount] = useState(0);
      const [syncing, setSyncing] = useState(false);

      const updateQueue = () => setQueueCount(getSyncQueue().length);

      useEffect(() => {
        const handle = () => {
          const creds = getCredentials();
          setIsOnline(navigator.onLine && !creds.simulateOffline);
        };
        window.addEventListener('online', handle);
        window.addEventListener('offline', () => setIsOnline(false));
        window.addEventListener('fortegado_queue_update', updateQueue);
        window.addEventListener('fortegado_credentials_update', handle);
        updateQueue();
        handle();
        return () => {
          window.removeEventListener('online', handle);
          window.removeEventListener('offline', () => setIsOnline(false));
          window.removeEventListener('fortegado_queue_update', updateQueue);
          window.removeEventListener('fortegado_credentials_update', handle);
        };
      }, []);

      const handleSync = async () => {
        if (syncing) return;
        setSyncing(true);
        try {
          const queueBefore = getSyncQueue();
          const res = await syncQueueToSupabase();
          
          // Sincronizar com o Google Sheets somente os itens processados com sucesso no Supabase
          const queueAfter = getSyncQueue();
          const processedItems = queueBefore.filter(itemBefore => 
            !queueAfter.some(itemAfter => itemAfter.id === itemBefore.id)
          );

          for (const it of processedItems) {
            await syncToGoogleSheets(it.actionType, it.payload);
          }

          updateQueue();

          if (res && !res.success) {
            alert(`Erro na sincronização: ${res.reason || 'Conexão ou banco de dados falhou'}. (${res.processed || 0} ações integradas)`);
          } else {
            alert(`Sincronização concluída! ${res ? (res.processed || 0) : 0} ações integradas.`);
          }
        } catch (e) {
          alert('Erro na sincronização: ' + e.message);
        } finally {
          setSyncing(false);
        }
      };

      // Auto-sync ao carregar ou conectar
      useEffect(() => {
        if (isOnline && queueCount > 0 && !syncing) {
          handleSync();
        }
      }, [isOnline, queueCount, syncing]);

      return (
        <div className={`connection-bar ${isOnline ? 'online' : 'offline'}`} style={{ borderRadius: '8px', marginBottom: '14px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
            {isOnline ? <Wifi size={14} /> : <WifiOff size={14} />}
            <span>{isOnline ? 'Conectado (Online)' : 'Modo Offline'}</span>

    // 4. Dashboard
    function Dashboard({ setView }) {
      const [metrics, setMetrics] = useState({ todaySales: 0, lowStock: 0, receive: 0, deliveries: 0 });
      const [user, setUser] = useState({});

      const load = () => {
        const db = getDb();
        const creds = getCredentials();
        const activeUser = db.usuarios.find(u => u.id === Number(creds.activeUserId)) || {};
        setUser(activeUser);
        
        // Vendas hoje (emissão hoje, filtrado por vendedor se não for administrador)
        const hojeStr = getLocalDateString(new Date());
        const pedidosHoje = db.pedidos.filter(p => {
          const pedDataStr = getLocalDateString(new Date(p.data));
          const matchesUser = activeUser.perfil === 'Administrador' || p.vendedor_id === activeUser.id;
          return pedDataStr === hojeStr && p.status !== 'Cancelado' && matchesUser;
        });
        const totalHoje = pedidosHoje.reduce((a, c) => a + c.total, 0);

        // Estoque baixo
        const low = db.estoque.filter(e => (e.quantidade_atual - e.quantidade_reservada) <= e.estoque_minimo).length;

        // Contas a receber (parcelas não pagas e não canceladas, filtradas por vendedor se necessário)
        const canceladosIds = db.pedidos.filter(p => p.status === 'Cancelado').map(p => p.id);
        const parcelasPendentes = db.parcelas.filter(par => {
          const ped = db.pedidos.find(p => p.id === par.pedido_id) || {};
          const matchesUser = activeUser.perfil === 'Administrador' || ped.vendedor_id === activeUser.id;
          return !par.pago && !canceladosIds.includes(par.pedido_id) && matchesUser;
        });
        const totalReceber = parcelasPendentes.reduce((a, c) => a + c.valor, 0);

        // Entregas pendentes (pedidos com status "Emitido", filtrados por vendedor se necessário)
        const deliv = db.pedidos.filter(p => {
          const matchesUser = activeUser.perfil === 'Administrador' || p.vendedor_id === activeUser.id;
          return p.status === 'Emitido' && matchesUser;
        }).length;

        setMetrics({ todaySales: totalHoje, lowStock: low, receive: totalReceber, deliveries: deliv });
      };

      useEffect(() => {
        load();
        window.addEventListener('fortegado_db_update', load);
        return () => window.removeEventListener('fortegado_db_update', load);
      }, []);

      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '16px' }}>
            <div>
              <h2 style={{ fontSize: '1.25rem' }}>Olá, {user.nome}</h2>
              <span style={{ fontSize: '0.8rem', color: 'var(--cinza-medio)' }}>Perfil: <strong>{user.perfil}</strong></span>
            </div>
          </div>

          <div className="dashboard-grid">
            <div className="card kpi-card kpi-vendas" onClick={() => setView('financeiro')} style={{ cursor: 'pointer' }}>
              <div className="kpi-title">Vendas Hoje</div>
              <div className="kpi-value">R$ {metrics.todaySales.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</div>
            </div>
            <div className="card kpi-card kpi-estoque" onClick={() => setView('estoque')} style={{ cursor: 'pointer' }}>
              <div className="kpi-title">Estoque Crítico</div>
              <div className="kpi-value" style={{ color: metrics.lowStock > 0 ? 'red' : 'inherit' }}>{metrics.lowStock}</div>
            </div>
            <div className="card kpi-card kpi-financeiro" onClick={() => setView('financeiro')} style={{ cursor: 'pointer' }}>
              <div className="kpi-title">A Receber</div>
              <div className="kpi-value">R$ {metrics.receive.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</div>
            </div>
            <div className="card kpi-card kpi-entregas" onClick={() => setView('entregas')} style={{ cursor: 'pointer' }}>
              <div className="kpi-title">Entregas Pendentes</div>
              <div className="kpi-value">{metrics.deliveries}</div>

          <div className="shortcuts-grid">

    // 9. OrderForm (Novo Pedido)
    function OrderForm({ setView }) {
      const [step, setStep] = useState(1);
      const [clients, setClients] = useState([]);
      const [products, setProducts] = useState([]);
      const [stock, setStock] = useState([]);
      
      // Pedido
      const [selectedClient, setSelectedClient] = useState('');
      const [cart, setCart] = useState([]);
      const [payMethod, setPayMethod] = useState('');
      const [payCond, setPayCond] = useState('');
      const [payDetail, setPayDetail] = useState('');
      const [installments, setInstallments] = useState([]);
      const [sign, setSign] = useState(null);
      const [gps, setGps] = useState(null);
      const [successOrder, setSuccessOrder] = useState(null);

      useEffect(() => {
        const db = getDb();
        setClients(db.clientes);
        setProducts(db.produtos);
        setStock(db.estoque);
      }, []);

      const orderTotal = cart.reduce((a,c)=>a + (c.quantidade * c.valor_unitario) - c.desconto, 0);

      const addProduct = (p) => {
        const est = stock.find(e => e.produto_id === p.id) || {};
        const disp = est.quantidade_atual - est.quantidade_reservada;
        if (disp <= 0) { alert('Sem estoque!'); return; }

        const idx = cart.findIndex(c => c.produto_id === p.id);
        if (idx > -1) {
          const updated = [...cart];
          if (updated[idx].quantidade + 1 > disp) { alert('Limite de estoque!'); return; }
          updated[idx].quantidade++;
          setCart(updated);
        } else {
          setCart([...cart, { produto_id: p.id, quantidade: 1, valor_unitario: p.preco, desconto: 0 }]);
        }
      };

      const setQty = (prodId, delta) => {
        const idx = cart.findIndex(c => c.produto_id === prodId);
        if (idx === -1) return;
        const updated = [...cart];
        const est = stock.find(e => e.produto_id === prodId) || {};
        const disp = est.quantidade_atual - est.quantidade_reservada;
        const n = updated[idx].quantidade + delta;
        if (n <= 0) { setCart(cart.filter(c => c.produto_id !== prodId)); return; }
        if (n > disp) { alert('Sem estoque disponível!'); return; }
        updated[idx].quantidade = n;
        setCart(updated);
      };

      const generateInstallments = () => {
        let computed = [];
        const today = new Date();
        if (payCond === 'À vista') {
          computed.push({ vencimento: getLocalDateString(today), valor: orderTotal });
        } else if (payCond === 'Prazo direto' && payDetail) {
          const due = new Date();
          due.setDate(today.getDate() + Number(payDetail));
          computed.push({ vencimento: getLocalDateString(due), valor: orderTotal });
        } else if (payCond === 'Parcelado' && payDetail) {
          const intervals = payDetail.split('/').map(Number);
          const val = orderTotal / intervals.length;
          intervals.forEach(d => {
            const due = new Date();
            due.setDate(today.getDate() + d);
            computed.push({ vencimento: getLocalDateString(due), valor: val });
          });
        }
        setInstallments(computed);
      };

      useEffect(() => {
        generateInstallments();
      }, [payCond, payDetail, orderTotal]);

      const captureGps = () => {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(pos => {
            setGps({ latitude: pos.coords.latitude, longitude: pos.coords.longitude });
          }, err => {
            setGps({ latitude: -19.7476, longitude: -47.9392 });
          });
        } else {
          setGps({ latitude: -19.7476, longitude: -47.9392 });
        }
      };

      const saveOrder = () => {
        if (!selectedClient) { alert('Selecione o cliente!'); return; }
        if (cart.length === 0) { alert('Carrinho vazio!'); return; }
        if (!payMethod) { alert('Forma de pagamento obrigatória!'); return; }
        if (!gps) { alert('GPS obrigatório!'); return; }
        if (!sign) { alert('Assinatura obrigatória!'); return; }

        const ped = createOrderLocal({
          cliente_id: selectedClient,
          vendedor_id: getCredentials().activeUserId,
          total: orderTotal,
          itens: cart,
          parcelas: installments,
          assinatura: sign,
          latitude: gps.latitude,
          longitude: gps.longitude
        });
        setSuccessOrder(ped);
        setStep(5);
      };

      const clientObj = clients.find(c => c.id === Number(selectedClient)) || {};

      return (
        <div>
          <div className="step-bar">
            <div className={`step-item ${step >= 1 ? 'active' : ''}`}>1</div>
            <div className={`step-item ${step >= 2 ? 'active' : ''}`}>2</div>
            <div className={`step-item ${step >= 3 ? 'active' : ''}`}>3</div>
            <div className={`step-item ${step >= 4 ? 'active' : ''}`}>4</div>
            <div className={`step-item ${step >= 5 ? 'active' : ''}`}>5</div>
          </div>

          {step === 1 && (
            <div className="card">
              <h3>Selecionar Cliente</h3>
              <select className="form-control" value={selectedClient} onChange={e=>setSelectedClient(e.target.value)}>
                <option value="">-- Escolha --</option>
                {clients.map(c => <option key={c.id} value={c.id}>{c.nome}</option>)}
              </select>
              <button className="btn btn-primary" onClick={() => selectedClient ? setStep(2) : alert('Selecione!')} style={{ marginTop: '15px' }}>Avançar</button>
            </div>
          )}

          {step === 2 && (
            <div>
              <div className="card">
                <h3>Produtos</h3>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', maxHeight: '150px', overflowY: 'auto' }}>
                  {products.map(p => {
                    const est = stock.find(e => e.produto_id === p.id) || {};
                    const disp = est.quantidade_atual - est.quantidade_reservada;
                    return (
                      <div key={p.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '6px', background: '#F8FAFC' }}>
                        <span>{p.nome} (R$ {p.preco}) | Disp: {disp}</span>
                        <button className="btn btn-primary" onClick={()=>addProduct(p)} style={{ width: 'auto', padding: '2px 8px' }}>Add</button>
                      </div>
                    );
                  })}
                </div>
              </div>
              <div className="card">
                <h3>Itens</h3>
                {cart.map(c => {
                  const p = products.find(pr => pr.id === c.produto_id) || {};
                  return (
                    <div key={c.produto_id} style={{ display: 'flex', justifyContent: 'space-between', padding: '6px' }}>
                      <span>{p.nome}</span>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                        <button className="btn btn-secondary" onClick={()=>setQty(c.produto_id, -1)} style={{ width: 'auto', padding: '2px 6px' }}>-</button>
                        <span>{c.shadow || c.quantidade}</span>
                        <button className="btn btn-secondary" onClick={()=>setQty(c.produto_id, 1)} style={{ width: 'auto', padding: '2px 6px' }}>+</button>
                      </div>
                    </div>
                  );
                })}
                <div className="cart-total-bar">Total: R$ {orderTotal.toFixed(2)}</div>
                <div style={{ display: 'flex', gap: '10px', marginTop: '15px' }}>
                  <button className="btn btn-secondary" onClick={()=>setStep(1)}>Voltar</button>
                  <button className="btn btn-primary" onClick={()=>cart.length > 0 ? setStep(3) : alert('Adicione produtos!')}>Avançar</button>
                </div>
              </div>
            </div>
          )}

          {step === 3 && (
            <div className="card">
              <h3>Pagamento</h3>
              <div className="form-group"><label>Forma de Pagamento</label>
                <select className="form-control" value={payMethod} onChange={e=>setPayMethod(e.target.value)}>
                  <option value="">-- Escolha --</option>
                  <option value="PIX">PIX</option>
                  <option value="Boleto">Boleto</option>
                  <option value="Dinheiro">Dinheiro</option>
                </select>
              </div>
              <div className="form-group"><label>Condição</label>
                <select className="form-control" value={payCond} onChange={e=>{ setPayCond(e.target.value); setPayDetail(''); }}>
                  <option value="">-- Escolha --</option>
                  <option value="À vista">À vista</option>
                  <option value="Prazo direto">Prazo Direto</option>
                  <option value="Parcelado">Parcelado</option>
                </select>
              </div>
              {payCond === 'Prazo direto' && (
                <select className="form-control" value={payDetail} onChange={e=>setPayDetail(e.target.value)}>
                  <option value="">-- Prazo --</option>
                  <option value="30">30 dias</option><option value="60">60 dias</option>
                </select>
              )}
              {payCond === 'Parcelado' && (
                <select className="form-control" value={payDetail} onChange={e=>setPayDetail(e.target.value)}>
                  <option value="">-- Parcelas --</option>
                  <option value="30/60">30 / 60 dias</option><option value="30/60/90">30/60/90 dias</option>
                </select>
              )}
              <div style={{ display: 'flex', gap: '10px', marginTop: '15px' }}>
                <button className="btn btn-secondary" onClick={()=>setStep(2)}>Voltar</button>
                <button className="btn btn-primary" onClick={()=>payMethod && payCond ? setStep(4) : alert('Selecione!')}>Avançar</button>
              </div>
            </div>
          )}

          {step === 4 && (
            <div className="card">
              <h3>Assinatura & GPS</h3>
              <button className="btn btn-outline" onClick={captureGps} style={{ marginBottom: '14px' }}>
                {gps ? `GPS Lido: ${gps.latitude.toFixed(4)}, ${gps.longitude.toFixed(4)}` : 'Ler GPS'}
              </button>
              <CanvasSignature onSave={setSign} onClearSignature={()=>setSign(null)} />
              <div style={{ display: 'flex', gap: '10px', marginTop: '15px' }}>
                <button className="btn btn-secondary" onClick={()=>setStep(3)}>Voltar</button>
                <button className="btn btn-primary" onClick={saveOrder}>Finalizar Pedido</button>
              </div>
            </div>
          )}

          {step === 5 && (
            <div className="card" style={{ textAlign: 'center' }}>
              <CheckCircle size={32} color="green" />
              <h3>Sucesso!</h3>
              <p>Pedido: <strong>{successOrder.numero}</strong> cadastrado e estoque reservado!</p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', marginTop: '15px' }}>
                <button className="btn btn-cta" onClick={()=>printOrderPDF(successOrder.id)}>Imprimir Pedido (PDF)</button>
                <button className="btn btn-success" onClick={() => window.open(`https://wa.me/?text=Pedido+${successOrder.numero}+Emitido`)}>WhatsApp</button>
                <button className="btn btn-secondary" onClick={()=>setView('dashboard')}>Voltar ao Início</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // ROTEADOR CENTRAL DA APLICAÇÃO (App)
    // ==========================================
    function App() {
      const [view, setView] = useState('dashboard');
      const [user, setUser] = useState(null);

      const load = () => {
        const db = getDb();
        const creds = getCredentials();
        setUser(db.usuarios.find(u => u.id === Number(creds.activeUserId)) || {});
      };

      useEffect(() => {
        load();

        // Sincronizar dados do Supabase na inicialização
        const syncOnStartup = async () => {
          try {
            const res = await downloadDataFromSupabase();
            if (res.success) {
              console.log('[Supabase] Dados baixados com sucesso na inicialização. Pedidos:', res.pedidos || 0);
              load();
              window.dispatchEvent(new Event('fortegado_db_update'));
            } else {
              console.warn('[Supabase] Falha no download inicial:', res.reason);
            }
          } catch (e) {
            console.error('[Supabase] Erro inesperado na inicialização:', e);
          }
        };
        syncOnStartup();

        window.addEventListener('fortegado_credentials_update', load);
        window.addEventListener('fortegado_db_update', load);
        return () => {
          window.removeEventListener('fortegado_credentials_update', load);
          window.removeEventListener('fortegado_db_update', load);
        };
      }, []);

      return (
        <div className="app-container">
          <header>
            <div className="header-logo-container" onClick={() => setView('dashboard')} style={{ cursor: 'pointer' }}>
              <span style={{ fontSize: '24px' }}>🐂</span>
              <div className="header-title">
                <h1>Forte Gado</h1>
                <span style={{ fontSize: '0.65rem', color: 'var(--amarelo-cta)', fontWeight: 'bold' }}>Vendas &amp; Estoque</span>
              </div>
            </div>
            <div className="header-meta">
              <div style={{ fontWeight: 'bold' }}>{user ? user.nome : 'Carregando...'}</div>
              <div style={{ fontSize: '0.7rem', opacity: 0.8 }}>{user ? user.perfil : ''}</div>
            </div>
          </header>

          <main>
            <OfflineIndicator />
            {view === 'dashboard' && <Dashboard setView={setView} />}
            {view === 'novo-pedido' && <OrderForm setView={setView} />}
            {view === 'entregas' && <Deliveries />}
            {view === 'estoque' && <StockManager />}
            {view === 'financeiro' && <Financial />}
            {view === 'configuracoes' && <Settings setView={setView} />}
          </main>

          <nav style={{
            backgroundColor: 'var(--azul-principal)',
            borderTop: '2px solid var(--dourado-premium)',
            display: 'flex',
            justifyContent: 'space-around',
            padding: '8px 0',
            position: 'sticky',
            bottom: 0,
            zIndex: 100
          }}>
            <button onClick={() => setView('dashboard')} style={navItemStyle(view === 'dashboard')}><Home size={18} /><span>Início</span></button>
            <button onClick={() => setView('novo-pedido')} style={navItemStyle(view === 'novo-pedido')}><ShoppingBag size={18} /><span>Vender</span></button>
            <button onClick={() => setView('entregas')} style={navItemStyle(view === 'entregas')}><Truck size={18} /><span>Entregas</span></button>
            <button onClick={() => setView('estoque')} style={navItemStyle(view === 'estoque')}><Package size={18} /><span>Estoque</span></button>
            <button onClick={() => setView('financeiro')} style={navItemStyle(view === 'financeiro')}><DollarSign size={18} /><span>Contas</span></button>
            <button onClick={() => setView('configuracoes')} style={navItemStyle(view === 'configuracoes')}><SettingsIcon size={18} /><span>Config</span></button>
          </nav>

          <footer>Forte Gado © 2026 – Vendas e Estoque.</footer>
        </div>
      );
    }

    const navItemStyle = (isActive) => ({
      background: 'none', border: 'none',
      color: isActive ? 'var(--amarelo-cta)' : '#FFFFFF',
      opacity: isActive ? 1 : 0.75,
      display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '3px',
      cursor: 'pointer', fontSize: '0.65rem', fontWeight: 'bold'
    });

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
